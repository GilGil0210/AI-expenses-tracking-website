<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard</title>
    <link rel="stylesheet" href="Dashboard.css" />
    <script src="balanceMath.js"></script>
  </head>
  <body>
    <div class="container">
      <aside class="sidebar">
        <img class="logo" src="indexImages/SpendBetterLogo.png" />
        <nav>
          <a href="#">🏠 Dashboard</a>
          <a href="#">💰 Receipts</a>
          <a href="#">📈 Transactions</a>
          <a href="#">📅 Budgets</a>
        </nav>
      </aside>
      <main class="main-content">
        <div class="grid-container">
          <div class="card" id="total-Balance">
            <h3>Total Balance</h3>
            <h1>$0.00</h1>
          </div>
          <div class="card" id="this-month">
            <h3>This Month</h3>
            <h1>$0.00</h1>
          </div>
          <div class="card" id="Saved">
            <h3>Saved</h3>
            <h1>$0.00</h1>
          </div>
          <div class="card" id="Upcoming-Bills">
            <h3>Upcoming Bills</h3>
            <h1>$0.00</h1>
          </div>
          <div class="card" id="Spending-Overview"></div>
          <div class="card" id="Spending-Category"></div>
          <div class="card" id="Recent"></div>
        </div>
      </main>
    </div>
    <script src="balanceMath.js"></script>
  </body>
</html>
