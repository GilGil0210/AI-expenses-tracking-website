<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard</title>
    <link rel="stylesheet" href="Dashboard.css" />
    <!-- <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="balanceMath.js"></script> -->
  </head>
  <body>
    <div class="container">
      <aside class="sidebar">
        <img class="logo" src="indexImages/SpendBetterLogo.png" />
        <nav>
          <a href="Dashboard.html">🏠 Dashboard</a>
          <a href="#">💰 Receipts [Maintenance]</a>
          <a href="transactions.html">📈 Transactions</a>
          <a href="#">📅 Budgets</a>
        </nav>
        <button id="logoutBtn" class="logout-btn">🚪 Logout</button>
      </aside>
      <main class="main-content">
        <div class="grid-container">
          <div class="card" id="total-Balance">
            <h3>Total Balance</h3>
            <h1 id="balance">$0.00</h1>
          </div>
          <div class="card" id="this-month">
            <h3>This Month</h3>
            <h1 id="monthTotal">$0.00</h1>
          </div>
          <div class="card" id="Saved">
            <h3>Saved</h3>
            <h1 id="saved">$0.00</h1>
          </div>
          <div class="card" id="Upcoming-Bills">
            <h3>Upcoming Bills</h3>
            <h1 id="bills">$0.00</h1>
          </div>
          <div class="card" id="Spending-Overview">
            <h3>Spending Overview</h3>
            <canvas id="lineChart"></canvas>
          </div>
          <div class="card" id="Spending-Category">
            <h3>Spending by Category</h3>
            <canvas id="pieChart"></canvas>
          </div>
          <div class="card" id="Recent">
            <table class="transaction-table">
              <thead>
                <tr>
                  <th>Merchant</th>
                  <th>Category</th>
                  <th>Date</th>
                  <th>Amount</th>
                </tr>
              </thead>

              <tbody id="transactionBody"></tbody>
            </table>
          </div>
        </div>
      </main>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="balanceMath.js"></script>
  </body>
</html>
